/* ── TOAST ──────────────────────────────────────────────── */
function Toast({msg,kind,onDone}){
  useEffect(()=>{const t=setTimeout(onDone,3000);return()=>clearTimeout(t);},[]);
  const bg=kind==='error'?'oklch(0.45 0.18 27)':kind==='warning'?'oklch(0.38 0.12 60)':emeraldDeep;
  return <div style={{position:'fixed',bottom:24,right:24,zIndex:9999,background:bg,color:'white',padding:'12px 18px',borderRadius:R,fontSize:14,maxWidth:320,lineHeight:1.5,boxShadow:'0 4px 16px oklch(0 0 0 / 0.15)'}}>{msg}</div>;
}

/* ── APP ────────────────────────────────────────────────── */
function App(){
  const [screen,setScreen]=useState(()=>localStorage.getItem('xg.screen')||'login');
  const [user,setUser]=useState(()=>{try{return JSON.parse(localStorage.getItem('xg.user'))||null}catch{return null}});
  const [clientId,setClientId]=useState(()=>localStorage.getItem('xg.client')||CLIENTS[0].id);
  const [page,setPage]=useState(()=>localStorage.getItem('xg.page')||'overview');
  const [toasts,setToasts]=useState([]);
  const [showTweaks,setShowTweaks]=useState(false);
  // Shared state
  const [emails,setEmails]=useState(EMAILS_INIT);
  const [products,setProducts]=useState(PRODUCTS_INIT);
  const [customers,setCustomers]=useState(CUSTOMERS_INIT);

  useEffect(()=>{localStorage.setItem('xg.screen',screen);},[screen]);
  useEffect(()=>{localStorage.setItem('xg.user',JSON.stringify(user));},[user]);
  useEffect(()=>{localStorage.setItem('xg.client',clientId);},[clientId]);
  useEffect(()=>{localStorage.setItem('xg.page',page);},[page]);

  useEffect(()=>{
    const h=e=>{
      if(e.data?.type==='__activate_edit_mode')setShowTweaks(true);
      if(e.data?.type==='__deactivate_edit_mode')setShowTweaks(false);
    };
    window.addEventListener('message',h);
    window.parent.postMessage({type:'__edit_mode_available'},'*');
    return()=>window.removeEventListener('message',h);
  },[]);

  const toast=useCallback((msg,kind='success')=>setToasts(p=>[...p,{msg,kind,id:Date.now()}]),[]);
  const allTags=useMemo(()=>[...new Set(customers.flatMap(c=>c.tags))].sort(),[customers]);

  const login=email=>{setUser({email});setScreen('dashboard');toast('Signed in successfully');};
  const logout=()=>{setUser(null);setScreen('login');setPage('overview');};

  const activeClient=CLIENTS.find(c=>c.id===clientId);
  const pendingCount=emails.filter(e=>e.status==='pending_approval').length;

  return (
    <div style={{minHeight:'100vh',background:paper}}>
      {screen==='login'&&<LoginPage onLogin={login} toast={toast}/>}
      {screen==='dashboard'&&(
        <DashLayout user={user} clients={CLIENTS} clientId={clientId} setClientId={setClientId} page={page} setPage={setPage} onLogout={logout} pendingCount={pendingCount}>
          {page==='overview'&&<OverviewPage client={activeClient} pendingCount={pendingCount} setPage={setPage}/>}
          {page==='sales'&&<SalesPage toast={toast}/>}
          {page==='customers'&&<CustomersPage customers={customers} setCustomers={setCustomers} allTags={allTags} toast={toast}/>}
          {page==='emails'&&<EmailsPage emails={emails} setEmails={setEmails} allTags={allTags} toast={toast}/>}
          {page==='products'&&<ProductsPage products={products} setProducts={setProducts} toast={toast}/>}
          {page==='redeem'&&<RedeemPage toast={toast}/>}
          {page==='templates'&&<TemplatesPage/>}
          {page==='admin-clients'&&<AdminClientsPage/>}
          {page==='admin-bookings'&&<AdminBookingsPage/>}
        </DashLayout>
      )}
      {toasts.map(t=><Toast key={t.id} msg={t.msg} kind={t.kind} onDone={()=>setToasts(p=>p.filter(x=>x.id!==t.id))}/>)}
      {showTweaks&&<TweaksPanel/>}
    </div>
  );
}

/* ── LOGIN ──────────────────────────────────────────────── */
function LoginPage({onLogin,toast}){
  const [email,setEmail]=useState('');
  const [pw,setPw]=useState('');
  const [loading,setLoading]=useState(false);
  const [err,setErr]=useState('');

  const submit=async e=>{
    e.preventDefault();setErr('');
    if(pw.length<10){setErr('Password must be at least 10 characters.');return;}
    setLoading(true);
    await new Promise(r=>setTimeout(r,800));
    setLoading(false);
    onLogin(email.trim());
  };

  return (
    <div className="fade-up" style={{display:'flex',flexDirection:'column',minHeight:'100vh',background:paper}}>
      <header style={{borderBottom:`1px solid ${hairline}`}}>
        <div style={{maxWidth:1200,margin:'0 auto',padding:'0 32px',height:64,display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <LogoMark/>
          <span style={{fontSize:14,color:inkSoft,cursor:'pointer'}}>← Back to site</span>
        </div>
      </header>
      <main style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',padding:'64px 20px'}}>
        <div style={{width:'100%',maxWidth:400}}>
          <p style={{fontSize:12,textTransform:'uppercase',letterSpacing:'0.16em',color:inkMuted}}>Client portal</p>
          <h1 style={{marginTop:12,fontSize:36,fontWeight:400,color:ink,lineHeight:1.1}}>Sign in</h1>
          <p style={{marginTop:12,fontSize:15,color:inkSoft,lineHeight:1.6}}>Access your gift card revenue data, customers, and campaigns.</p>
          <form onSubmit={submit} style={{marginTop:40,display:'flex',flexDirection:'column',gap:20}}>
            <Field label="Email">
              <input type="email" autoComplete="email" required value={email} onChange={e=>setEmail(e.target.value)} placeholder="client@xperigift.com" style={inputSt(!!err)}/>
            </Field>
            <Field label="Password">
              <input type="password" autoComplete="current-password" required minLength={10} value={pw} onChange={e=>setPw(e.target.value)} style={inputSt(!!err)}/>
            </Field>
            {err&&<p style={{padding:'10px 12px',background:'oklch(0.97 0.03 27)',border:'1px solid oklch(0.85 0.08 27)',borderRadius:R,fontSize:13,color:'oklch(0.4 0.18 27)'}}>{err}</p>}
            <Btn type="submit" primary fullWidth disabled={loading}>
              {loading?<><LoadSpinner/> Signing in…</>:'Sign in'}
            </Btn>
          </form>
          <p style={{marginTop:32,fontSize:13,color:inkMuted}}>Accounts are issued by xperigift. Need access? <span style={{textDecoration:'underline',textUnderlineOffset:4,cursor:'pointer'}}>Book an audit</span>.</p>
          <p style={{marginTop:20,fontSize:12,color:inkMuted,padding:'10px 12px',background:paperSoft,borderRadius:R}}>Use any email + password ≥ 10 chars to enter the demo.</p>
        </div>
      </main>
    </div>
  );
}

/* ── SALES ──────────────────────────────────────────────── */
function SalesPage({toast}){
  const [filterStatus,setFilterStatus]=useState('all');
  const kpis={count:SALES.length,total:SALES.reduce((s,r)=>s+r.amount_cents,0),avg:Math.round(SALES.reduce((s,r)=>s+r.amount_cents,0)/SALES.length),redeemed:SALES.reduce((s,r)=>s+r.redeemed_cents,0)};
  const months=['May','Jun','Jul','Aug','Sep','Oct','Nov','Dec','Jan','Feb','Mar','Apr'];
  const chartVals=[1200,900,1100,1400,1600,2100,4800,6200,2800,3100,2200,6700];
  const maxV=Math.max(...chartVals);
  const breakdown=Object.entries(SALES.reduce((acc,r)=>{const k=r.product_name||'Other';if(!acc[k])acc[k]={count:0,amount:0};acc[k].count++;acc[k].amount+=r.amount_cents;return acc},{})).map(([name,v])=>({name,...v})).sort((a,b)=>b.amount-a.amount);
  const maxB=breakdown[0]?.amount||1;
  const PAL=['oklch(0.42 0.09 165)','oklch(0.55 0.14 240)','oklch(0.62 0.16 55)','oklch(0.5 0.16 320)','oklch(0.55 0.14 200)'];
  const filtered=filterStatus==='all'?SALES:SALES.filter(r=>r.status===filterStatus);
  return(
    <Shell title="Sales" subtitle="Gift cards sold, revenue, and breakdown by service or bundle."
      actions={<><Btn icon="upload" onClick={()=>toast('CSV import connects to live Supabase in production')}>Import CSV</Btn><Btn icon="download" onClick={()=>toast('Exported sales.csv')}>Export</Btn><Btn icon="plus" primary onClick={()=>toast('New sale dialog — connects to Supabase in production')}>New sale</Btn></>}>
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(180px,1fr))',gap:16}}>
        <KpiCard label="Cards sold" value={fmtN(kpis.count)} tone="ink" icon="shopping-bag"/>
        <KpiCard label="Revenue" value={fmt$(kpis.total)} tone="emerald" icon="dollar-sign"/>
        <KpiCard label="Avg ticket" value={fmt$(kpis.avg)} icon="trending-up"/>
        <KpiCard label="Redeemed" value={fmt$(kpis.redeemed)} hint={`${Math.round(kpis.redeemed/kpis.total*100)}% of issued`} tone="sky"/>
      </div>
      <Card style={{marginTop:24}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}><h2 style={{fontSize:18,color:ink}}>Revenue trend</h2><span style={{fontSize:12,color:inkMuted}}>Last 12 months</span></div>
        <div style={{display:'flex',alignItems:'flex-end',gap:6,height:160}}>
          {chartVals.map((v,i)=>(
            <div key={i} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:4}}>
              <div style={{width:'100%',height:Math.round((v/maxV)*148),background:i===11?emerald:hairlineStrong,borderRadius:'2px 2px 0 0'}}/>
              <span style={{fontSize:9,color:inkMuted}}>{months[i]}</span>
            </div>
          ))}
        </div>
      </Card>
      <Card style={{marginTop:16}}>
        <div style={{display:'flex',justifyContent:'space-between',marginBottom:20}}><h2 style={{fontSize:18,color:ink}}>Top products</h2><span style={{fontSize:12,color:inkMuted}}>By revenue</span></div>
        <div style={{display:'flex',flexDirection:'column',gap:14}}>
          {breakdown.map((p,i)=>(
            <div key={p.name}>
              <div style={{display:'flex',justifyContent:'space-between',fontSize:13,marginBottom:6}}><span style={{color:ink}}>{p.name}</span><span style={{color:inkSoft}}>{fmt$(p.amount)} · {p.count} cards</span></div>
              <div style={{height:8,borderRadius:9999,background:paperSoft,overflow:'hidden'}}><div style={{height:'100%',width:`${(p.amount/maxB)*100}%`,background:PAL[i%PAL.length],borderRadius:9999}}/></div>
            </div>
          ))}
        </div>
      </Card>
      <div style={{marginTop:16,display:'flex',alignItems:'center',gap:12,flexWrap:'wrap'}}>
        <span style={{fontSize:13,color:inkMuted}}>Status</span>
        <select value={filterStatus} onChange={e=>setFilterStatus(e.target.value)} style={{height:36,border:`1px solid ${hairlineStrong}`,borderRadius:R,background:paper,padding:'0 8px',fontSize:13,color:ink}}>
          {['all','sold','partially_redeemed','redeemed','refunded','expired'].map(s=><option key={s} value={s}>{s.replace('_',' ')}</option>)}
        </select>
        <span style={{marginLeft:'auto',fontSize:13,color:inkMuted}}>{filtered.length} rows</span>
      </div>
      <TableWrap style={{marginTop:8}}>
        <thead><THead cols={['Sold','Product','Amount','Redeemed','Status','Buyer','Action']}/></thead>
        <tbody>
          {filtered.map(r=>{
            const canRedeem=(r.amount_cents-r.redeemed_cents)>0&&r.status!=='refunded'&&r.status!=='expired';
            return(
              <tr key={r.id} style={{borderBottom:`1px solid ${hairline}`}}>
                <TD muted>{fmtDate(r.sold_at)}</TD><TD>{r.product_name}</TD><TD bold>{fmt$(r.amount_cents)}</TD><TD muted>{fmt$(r.redeemed_cents)}</TD>
                <TD><StatusBadge s={r.status}/></TD><TD muted>{r.buyer_name||'—'}</TD>
                <TD right><Btn icon="scan" disabled={!canRedeem} onClick={()=>toast(`Redeeming: ${r.card_code} (${fmt$(r.amount_cents-r.redeemed_cents)} remaining)`)}>Redeem</Btn></TD>
              </tr>
            );
          })}
        </tbody>
      </TableWrap>
    </Shell>
  );
}

/* ── CUSTOMERS ──────────────────────────────────────────── */
function CustomersPage({customers,setCustomers,allTags,toast}){
  const avgSpend=Math.round(customers.reduce((s,c)=>s+c.total_spent,0)/customers.length);
  const repeats=customers.filter(c=>c.visits>1).length;
  const [addingTagFor,setAddingTagFor]=useState(null);
  const [newTagInput,setNewTagInput]=useState('');
  const tagInputRef=useRef();
  useEffect(()=>{if(addingTagFor&&tagInputRef.current)tagInputRef.current.focus();},[addingTagFor]);

  const addTag=(cid,tag)=>{
    if(!tag.trim())return;
    setCustomers(prev=>prev.map(c=>c.id===cid&&!c.tags.includes(tag)?{...c,tags:[...c.tags,tag]}:c));
    setNewTagInput('');setAddingTagFor(null);
    toast(`Tag "${tag}" added`);
  };
  const removeTag=(cid,tag)=>{
    setCustomers(prev=>prev.map(c=>c.id===cid?{...c,tags:c.tags.filter(t=>t!==tag)}:c));
  };

  return(
    <Shell title="Customers" subtitle="Gift card buyers — manage tags to target email campaigns.">
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(180px,1fr))',gap:16,marginBottom:24}}>
        <KpiCard label="Total" value={fmtN(customers.length)} tone="ink" icon="users"/>
        <KpiCard label="Avg spend" value={fmt$(avgSpend)} tone="emerald" icon="dollar-sign"/>
        <KpiCard label="Repeat buyers" value={fmtN(repeats)} hint={`${Math.round(repeats/customers.length*100)}% of base`} icon="trending-up"/>
      </div>
      {allTags.length>0&&(
        <div style={{marginBottom:16,display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>
          <span style={{fontSize:12,color:inkMuted,textTransform:'uppercase',letterSpacing:'0.12em',marginRight:4}}>Tags in use:</span>
          {allTags.map(tag=>(
            <span key={tag} style={{fontSize:12,padding:'3px 10px',borderRadius:9999,background:tagColor(tag,allTags)+'22',color:tagColor(tag,allTags),border:`1px solid ${tagColor(tag,allTags)}44`,fontWeight:500}}>
              {tag}
            </span>
          ))}
        </div>
      )}
      <TableWrap>
        <thead><THead cols={['Name','Email','Total spent','Visits','Last visit','Tags']}/></thead>
        <tbody>
          {customers.map(c=>(
            <tr key={c.id} style={{borderBottom:`1px solid ${hairline}`}}>
              <TD bold>{c.name}</TD>
              <TD muted>{c.email}</TD>
              <TD>{fmt$(c.total_spent)}</TD>
              <TD muted>{c.visits}</TD>
              <TD muted>{fmtDate(c.last_visit)}</TD>
              <td style={{padding:'8px 16px'}}>
                <div style={{display:'flex',alignItems:'center',gap:6,flexWrap:'wrap'}}>
                  {c.tags.map(tag=>(
                    <span key={tag} style={{display:'inline-flex',alignItems:'center',gap:4,fontSize:11,padding:'2px 8px 2px 10px',borderRadius:9999,background:tagColor(tag,allTags)+'22',color:tagColor(tag,allTags),border:`1px solid ${tagColor(tag,allTags)}44`,fontWeight:500,cursor:'default'}}>
                      {tag}
                      <button onClick={()=>removeTag(c.id,tag)} style={{background:'none',border:'none',cursor:'pointer',display:'flex',alignItems:'center',color:tagColor(tag,allTags),padding:0,opacity:0.7,lineHeight:1}} title="Remove tag"><Icon name="x" size={10}/></button>
                    </span>
                  ))}
                  {addingTagFor===c.id?(
                    <div style={{display:'flex',alignItems:'center',gap:4}}>
                      <input ref={tagInputRef} value={newTagInput} onChange={e=>setNewTagInput(e.target.value)}
                        onKeyDown={e=>{if(e.key==='Enter')addTag(c.id,newTagInput);if(e.key==='Escape'){setAddingTagFor(null);setNewTagInput('');}}}
                        placeholder="New tag…"
                        style={{height:24,width:90,border:`1px solid ${hairlineStrong}`,borderRadius:9999,padding:'0 8px',fontSize:11,outline:'none',background:paper,color:ink}}
                      />
                      {allTags.filter(t=>!c.tags.includes(t)&&(!newTagInput||t.toLowerCase().includes(newTagInput.toLowerCase()))).slice(0,4).map(t=>(
                        <button key={t} onClick={()=>addTag(c.id,t)} style={{fontSize:11,padding:'2px 8px',borderRadius:9999,background:paperSoft,border:`1px solid ${hairlineStrong}`,color:inkSoft,cursor:'pointer'}}>{t}</button>
                      ))}
                      <button onClick={()=>{setAddingTagFor(null);setNewTagInput('');}} style={{background:'none',border:'none',cursor:'pointer',color:inkMuted,padding:0}}><Icon name="x" size={12}/></button>
                    </div>
                  ):(
                    <button onClick={()=>setAddingTagFor(c.id)} style={{height:22,width:22,borderRadius:'50%',border:`1px dashed ${hairlineStrong}`,background:'transparent',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',color:inkMuted}} title="Add tag">
                      <Icon name="plus" size={11}/>
                    </button>
                  )}
                </div>
              </td>
            </tr>
          ))}
        </tbody>
      </TableWrap>
    </Shell>
  );
}

/* ── EMAILS ─────────────────────────────────────────────── */
function EmailsPage({emails,setEmails,allTags,toast}){
  const [selected,setSelected]=useState(null);

  const approve=id=>{setEmails(p=>p.map(e=>e.id===id?{...e,status:'approved'}:e));toast('Email approved — queued for send');setSelected(null);};
  const reject=id=>{setEmails(p=>p.map(e=>e.id===id?{...e,status:'rejected'}:e));toast('Email returned to Xperigift team','warning');setSelected(null);};
  const save=updated=>{setEmails(p=>p.map(e=>e.id===updated.id?updated:e));toast('Changes saved');};

  if(selected){
    const email=emails.find(e=>e.id===selected);
    return <EmailEditor email={email} allTags={allTags} onBack={()=>setSelected(null)} onSave={save} onApprove={approve} onReject={reject} toast={toast}/>;
  }

  const pending=emails.filter(e=>e.status==='pending_approval');
  return(
    <Shell title="Emails" subtitle="Review and approve campaigns before they send."
      actions={<Btn icon="plus" primary onClick={()=>toast('New campaign request sent to Xperigift team')}>New campaign</Btn>}>
      {pending.length>0&&(
        <div style={{marginBottom:32}}>
          <p style={{fontSize:12,textTransform:'uppercase',letterSpacing:'0.14em',color:inkMuted,marginBottom:12}}>Awaiting your approval</p>
          <div style={{display:'flex',flexDirection:'column',gap:10}}>
            {pending.map(e=>(
              <div key={e.id} style={{border:`1px solid var(--amber-border)`,borderRadius:R,background:'var(--amber)',padding:'16px 20px',display:'flex',alignItems:'flex-start',justifyContent:'space-between',gap:16}}>
                <div style={{flex:1,minWidth:0}}>
                  <button onClick={()=>setSelected(e.id)} style={{background:'none',border:'none',padding:0,cursor:'pointer',textAlign:'left'}}>
                    <p style={{fontWeight:500,color:ink,fontSize:15,textDecoration:'underline',textUnderlineOffset:3,textDecorationColor:hairlineStrong}}>{e.subject}</p>
                  </button>
                  <p style={{fontSize:13,color:inkMuted,marginTop:4}}>To: {e.segment_type==='all'?'All contacts':`Tagged: ${e.segment_tag}`} · Scheduled: {fmtDate(e.send_date)}</p>
                </div>
                <div style={{display:'flex',gap:8,flexShrink:0}}>
                  <Btn onClick={()=>setSelected(e.id)} icon="eye">Review</Btn>
                  <Btn onClick={()=>reject(e.id)}>Return</Btn>
                  <Btn primary onClick={()=>approve(e.id)}>Approve</Btn>
                </div>
              </div>
            ))}
          </div>
        </div>
      )}
      <p style={{fontSize:12,textTransform:'uppercase',letterSpacing:'0.14em',color:inkMuted,marginBottom:12}}>All campaigns</p>
      <TableWrap>
        <thead><THead cols={['Subject','Segment','Send date','Status']}/></thead>
        <tbody>

function ProductEditor({product,onBack,onSave}){

  const handleImage=e=>{
    const file=e.target.files?.[0];
    if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>update({image_url:ev.target.result});
    reader.readAsDataURL(file);
  };

  const addContent=()=>{
    if(!newItem.trim())return;
    update({contents:[...draft.contents,newItem.trim()]});
    setNewItem('');
  };
  const removeContent=i=>update({contents:draft.contents.filter((_,idx)=>idx!==i)});

  return(
    <div className="fade-up" style={{maxWidth:1200,margin:'0 auto',padding:'32px'}}>
      {/* Back + title */}
      <div style={{display:'flex',alignItems:'center',gap:16,marginBottom:32}}>

        {/* Left: image + basics */}
        <div style={{display:'flex',flexDirection:'column',gap:16}}>
          {/* Image */}
          <Card>
            <p style={{fontSize:12,textTransform:'uppercase',letterSpacing:'0.12em',color:inkMuted,marginBottom:12}}>Product image</p>
            <input ref={fileRef} type="file" accept="image/*" style={{display:'none'}} onChange={handleImage}/>
            <div onClick={()=>fileRef.current?.click()} style={{width:'100%',height:200,border:`2px dashed ${hairlineStrong}`,borderRadius:R,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',cursor:'pointer',overflow:'hidden',background:paperSoft,position:'relative'}}
              onMouseEnter={e=>e.currentTarget.style.borderColor=ink}
              onMouseLeave={e=>e.currentTarget.style.borderColor=hairlineStrong}>
              {draft.image_url
                ?<><img src={draft.image_url} alt="Product" style={{width:'100%',height:'100%',objectFit:'cover'}}/>
                  <div style={{position:'absolute',inset:0,background:'oklch(0 0 0 / 0.35)',display:'flex',alignItems:'center',justifyContent:'center',opacity:0,transition:'opacity 0.15s'}} onMouseEnter={e=>e.currentTarget.style.opacity=1} onMouseLeave={e=>e.currentTarget.style.opacity=0}>
                    <span style={{color:'white',fontSize:13,fontWeight:500}}>Change image</span>
                  </div></>
                :<><Icon name="upload" size={24} color={inkMuted}/><p style={{fontSize:13,color:inkMuted,marginTop:8}}>Click to upload an image</p><p style={{fontSize:11,color:inkMuted,marginTop:4}}>JPG, PNG, WebP — up to 5MB</p></>
              }
            </div>
            {draft.image_url&&<button onClick={()=>update({image_url:null})} style={{marginTop:8,fontSize:12,color:inkMuted,background:'none',border:'none',cursor:'pointer',textDecoration:'underline',textUnderlineOffset:3}}>Remove image</button>}
          </Card>

          {/* Basic info */}
          <Card>
            <p style={{fontSize:12,textTransform:'uppercase',letterSpacing:'0.12em',color:inkMuted,marginBottom:16}}>Details</p>
            <div style={{display:'flex',flexDirection:'column',gap:14}}>
              <Field label="Product name"><input value={draft.name} onChange={e=>update({name:e.target.value})} style={{...inputSt(),height:40,fontSize:14}}/></Field>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
                <Field label="Type">
                  <select value={draft.product_type} onChange={e=>update({product_type:e.target.value})} style={{height:40,border:`1px solid ${hairlineStrong}`,borderRadius:R,background:paper,padding:'0 8px',fontSize:14,color:ink,outline:'none'}}>

                    <option value="bundle">Bundle</option>
                    <option value="open_amount">Open amount</option>
                  </select>
                </Field>
                <Field label="Price (USD)">
                  <input type="number" step="0.01" min="0" placeholder="Open" value={draft.price_cents!=null?draft.price_cents/100:''} onChange={e=>update({price_cents:e.target.value?Math.round(parseFloat(e.target.value)*100):null})} style={{...inputSt(),height:40,fontSize:14}}/>
                </Field>

              <Field label="Status">

              style={{width:'100%',border:`1px solid ${hairlineStrong}`,borderRadius:R,background:paper,padding:'10px 12px',fontSize:14,color:ink,outline:'none',lineHeight:1.6,resize:'vertical'}}/>

              <div style={{display:'flex',flexDirection:'column',gap:8,marginBottom:12}}>
                {draft.contents?.map((item,i)=>(
                  <div key={i} style={{display:'flex',alignItems:'center',gap:8,padding:'8px 12px',background:paperSoft,borderRadius:R}}>
                    <span style={{width:6,height:6,borderRadius:'50%',background:emerald,flexShrink:0}}/>
                    <span style={{flex:1,fontSize:14,color:ink}}>{item}</span>
                    <button onClick={()=>removeContent(i)} style={{background:'none',border:'none',cursor:'pointer',color:inkMuted,padding:0,display:'flex',alignItems:'center'}}><Icon name="x" size={14}/></button>
                  </div>
                ))}
                {(!draft.contents||draft.contents.length===0)&&<p style={{fontSize:13,color:inkMuted,fontStyle:'italic'}}>No items yet. Add what's included in this bundle.</p>}
              </div>
              <div style={{display:'flex',gap:8}}>
                <input value={newItem} onChange={e=>setNewItem(e.target.value)} placeholder="e.g. 60-min Swedish Massage"
                  onKeyDown={e=>e.key==='Enter'&&addContent()}
                  style={{flex:1,height:36,border:`1px solid ${hairlineStrong}`,borderRadius:R,background:paper,padding:'0 12px',fontSize:13,color:ink,outline:'none'}}/>
                <Btn onClick={addContent} icon="plus">Add</Btn>
              </div>
            </Card>
          )}
        </div>
      </div>
    </div>
  );
}

/* ── REDEEM ─────────────────────────────────────────────── */
function RedeemPage({toast}){
  const [code,setCode]=useState('');
  const [result,setResult]=useState(null);
  const [amount,setAmount]=useState('');
  const lookup=()=>{
    const found=SALES.find(s=>s.card_code?.toLowerCase()===code.trim().toLowerCase());
    if(!found){toast('Card not found — check the code and try again','error');setResult(null);return;}
    setResult(found);setAmount('');
  };
  const redeem=()=>{
    const cents=Math.round(parseFloat(amount)*100);
    const rem=result.amount_cents-result.redeemed_cents;
    if(!cents||cents<=0){toast('Enter an amount to redeem','error');return;}
    if(cents>rem){toast(`Amount exceeds remaining balance (${fmt$(rem)})`,'error');return;}
    toast(`Redeemed ${fmt$(cents)} from card ${result.card_code}`);
    setResult(null);setCode('');setAmount('');
  };
  return(
    <Shell title="Redeem" subtitle="Look up a gift card by code and record a redemption.">
      <div style={{maxWidth:480}}>
        <div style={{display:'flex',gap:8}}>
          <input value={code} onChange={e=>setCode(e.target.value)} placeholder="e.g. XG-4821" onKeyDown={e=>e.key==='Enter'&&lookup()}
            style={{flex:1,height:44,border:`1px solid ${hairlineStrong}`,borderRadius:R,background:paper,padding:'0 12px',fontSize:15,color:ink,outline:'none',fontFamily:'ui-monospace,monospace'}}/>
          <Btn primary onClick={lookup}>Look up</Btn>
        </div>
        <p style={{marginTop:8,fontSize:12,color:inkMuted}}>Try: XG-4821, XG-2291, XG-5511, XG-9042</p>
        {result&&(
          <div style={{marginTop:24,border:`1px solid ${hairline}`,borderRadius:R,background:paper,padding:24}}>
            <p style={{fontSize:12,textTransform:'uppercase',letterSpacing:'0.14em',color:inkMuted}}>Card found</p>
            <p style={{fontSize:20,fontFamily:'Fraunces,Georgia,serif',color:ink,marginTop:8}}>{result.card_code}</p>
            <div style={{marginTop:16,display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
              <Stat label="Product" value={result.product_name}/>
              <Stat label="Remaining" value={fmt$(result.amount_cents-result.redeemed_cents)} big emeraldColor/>
              <Stat label="Buyer" value={result.buyer_name||'—'}/>
              <Stat label="Status" value={result.status.replace('_',' ')}/>
            </div>
            {(result.amount_cents-result.redeemed_cents)>0&&(
              <div style={{marginTop:20,display:'flex',gap:8}}>
                <input type="number" step="0.01" min="0" placeholder="Amount ($)" value={amount} onChange={e=>setAmount(e.target.value)}
                  style={{flex:1,height:40,border:`1px solid ${hairlineStrong}`,borderRadius:R,background:paper,padding:'0 12px',fontSize:14,color:ink,outline:'none'}}/>
                <Btn primary onClick={redeem}>Redeem</Btn>
              </div>
            )}
          </div>
        )}
      </div>
    </Shell>
  );
}

            <tr key={c.name} style={{borderBottom:`1px solid ${hairline}`}}>
              <TD bold>{c.name}</TD><TD muted>{c.industry}</TD>
              <TD><span style={{fontSize:12,fontWeight:500,color:c.active?emeraldDeep:inkMuted}}>{c.active?'Active':'Inactive'}</span></TD>
            </tr>
          ))}
        </tbody>
      </TableWrap>
    </Shell>
  );
}
function AdminBookingsPage(){
  return(
    <Shell title="Audit bookings">
      <TableWrap>
        <thead><THead cols={['Name','Business','Date','Status']}/></thead>
        <tbody>
          {[{name:'Maria G.',biz:'Glow Esthetics',date:'2026-04-22',status:'confirmed'},{name:'Trevor A.',biz:'River Bend Grille',date:'2026-04-24',status:'pending'},{name:'Yuki M.',biz:'Fairways Golf',date:'2026-04-28',status:'pending'}].map(b=>(
            <tr key={b.name} style={{borderBottom:`1px solid ${hairline}`}}>
              <TD bold>{b.name}</TD><TD>{b.biz}</TD><TD muted>{fmtDate(b.date)}</TD>
              <TD><span style={{fontSize:12,fontWeight:500,color:b.status==='confirmed'?emeraldDeep:inkMuted,textTransform:'capitalize'}}>{b.status}</span></TD>
            </tr>
          ))}
        </tbody>
      </TableWrap>
    </Shell>
  );
}

/* ── PRIMITIVES ─────────────────────────────────────────── */
function Shell({title,subtitle,actions,children}){
  return(
    <div className="fade-up" style={{maxWidth:1200,margin:'0 auto',padding:'40px 32px'}}>
      <div style={{display:'flex',alignItems:'flex-end',justifyContent:'space-between',marginBottom:32,gap:16,flexWrap:'wrap'}}>
        <div><h1 style={{fontSize:32,fontWeight:400,color:ink}}>{title}</h1>{subtitle&&<p style={{marginTop:4,fontSize:14,color:inkMuted}}>{subtitle}</p>}</div>
        {actions&&<div style={{display:'flex',gap:8,flexWrap:'wrap'}}>{actions}</div>}
      </div>
      {children}
    </div>
  );
}

function KpiCard({label,value,hint,tone='default',icon}){
  const tones={
    default:{border:`1px solid ${hairline}`,background:paper,lc:inkMuted,vc:ink,hc:inkMuted},
    emerald:{border:`1px solid oklch(0.42 0.09 165 / 0.3)`,background:emeraldSoft,lc:emeraldDeep,vc:emeraldDeep,hc:emeraldDeep},
    ink:{border:`1px solid ${ink}`,background:ink,lc:'oklch(1 0 0 / 0.7)',vc:paper,hc:'oklch(1 0 0 / 0.6)'},
    sky:{border:'1px solid var(--sky-border)',background:'var(--sky)',lc:'var(--sky-text)',vc:'var(--sky-text)',hc:'var(--sky-text)'},
  };
  const c=tones[tone]||tones.default;
  return(
    <div style={{borderRadius:R,padding:20,border:c.border,background:c.background}}>
      <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between'}}>
        <p style={{fontSize:12,textTransform:'uppercase',letterSpacing:'0.14em',color:c.lc}}>{label}</p>
        {icon&&<span style={{color:c.vc}}><Icon name={icon} size={16}/></span>}
      </div>
      <p style={{marginTop:12,fontFamily:'Fraunces,Georgia,serif',fontSize:28,lineHeight:1,color:c.vc}}>{value}</p>
      {hint&&<p style={{marginTop:8,fontSize:12,color:c.hc}}>{hint}</p>}
    </div>
  );
}

function Btn({children,icon,primary,disabled,onClick,type='button',fullWidth}){
  return(
    <button type={type} disabled={disabled} onClick={onClick}
      style={{height:primary&&fullWidth?44:primary?40:36,padding:fullWidth?'0':'0 12px',width:fullWidth?'100%':undefined,display:'inline-flex',alignItems:'center',justifyContent:'center',gap:8,borderRadius:R,border:primary?'none':`1px solid ${hairlineStrong}`,background:primary?ink:paper,color:primary?paper:ink,fontSize:13,fontWeight:primary?500:400,cursor:disabled?'not-allowed':'pointer',opacity:disabled?0.4:1,transition:'opacity 0.1s'}}>
      {icon&&<Icon name={icon} size={13}/>}{children}
    </button>
  );
}

function Field({label,children}){return <div><label style={{display:'block',fontSize:13,fontWeight:500,color:ink,marginBottom:6}}>{label}</label>{children}</div>;}
function Card({children,style={}}){return <div style={{border:`1px solid ${hairline}`,borderRadius:R,background:paper,padding:24,...style}}>{children}</div>;}
function TableWrap({children,style={}}){return <div style={{border:`1px solid ${hairline}`,borderRadius:R,background:paper,overflow:'hidden',...style}}><table style={{width:'100%',fontSize:14,borderCollapse:'collapse'}}>{children}</table></div>;}
function THead({cols}){return <tr style={{borderBottom:`1px solid ${hairline}`,background:paperSoft}}>{cols.map(h=><th key={h} style={{padding:'10px 16px',textAlign:'left',fontSize:12,textTransform:'uppercase',letterSpacing:'0.06em',color:inkMuted,fontWeight:500}}>{h}</th>)}</tr>;}
function TD({children,muted,bold,right}){return <td style={{padding:'12px 16px',color:muted?inkSoft:ink,fontWeight:bold?500:400,textAlign:right?'right':'left'}}>{children}</td>;}
function StatusBadge({s}){return <span style={{display:'inline-flex',alignItems:'center',height:24,padding:'0 8px',borderRadius:R,background:paperSoft,fontSize:12,color:inkSoft,textTransform:'capitalize'}}>{s}</span>;}
function Stat({label,value,big,emeraldColor}){return <div><p style={{fontSize:12,color:inkMuted}}>{label}</p><p style={{marginTop:2,fontSize:big?22:14,fontFamily:big?'Fraunces,Georgia,serif':undefined,color:emeraldColor?emeraldDeep:big?ink:inkSoft,fontWeight:big?400:500}}>{value}</p></div>;}
function LogoMark(){return <div style={{display:'flex',alignItems:'center',gap:8}}><span style={{fontFamily:'Fraunces,Georgia,serif',fontSize:20,fontWeight:600,letterSpacing:'-0.02em',color:ink,lineHeight:1}}>xperigift</span><span style={{width:6,height:6,borderRadius:'50%',background:emerald}}/></div>;}
function LoadSpinner(){return <svg className="spin" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4"/></svg>;}
function TweaksPanel(){return <div style={{position:'fixed',bottom:24,right:24,zIndex:9999,width:256,background:paper,border:`1px solid ${hairlineStrong}`,borderRadius:R,boxShadow:'0 4px 24px oklch(0 0 0 / 0.08)',padding:20}}><p style={{fontSize:13,fontWeight:600,color:ink,marginBottom:12}}>Tweaks</p><p style={{fontSize:12,color:inkMuted,lineHeight:1.5}}>Use any email + password ≥ 10 chars to log in.<br/><br/>All data is local — changes persist in the session but don't hit Supabase.</p></div>;}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
